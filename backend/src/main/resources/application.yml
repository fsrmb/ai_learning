server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_companion?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456 
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  ai:
    openai:
      api-key: test-api-key-placeholder

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true   # 下划线转驼峰：user_name → userName
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1haS1jb21wYW5pb24tcGxhdGZvcm0tMjAyNC1tdWx0aS1tb2R1bGUtcHJvamVjdA==
  expiration: 86400000    # 24小时（毫秒）

logging:
  level:
    com.aicompanion: debug
